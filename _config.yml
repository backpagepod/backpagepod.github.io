# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: A Back Page fansite
description: >- # this means to ignore newlines until "baseurl:"
  This is a fansite for The Back Page podcast presented by Matthew Castle and Samuel Roberts, made by their Discord community
github_username: IAmGrahamS
minimal_mistakes_skin: mint
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Europe/London

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "The Back Page Discord community"
  avatar : "/assets/images/backpage.png.webp"
  bio    : "Please join us on Discord"
  links:
    - label: "Patreon"
      icon: "fas fa-fw fa-link"
      url: "https://patreon.com/backpagepod"
    - label: "Discord"
      icon: "fab fa-fw fa-discord"
      url: "https://discord.com/invite/nEdhNnZxXg"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/backpagepod/backpagepod.github.io"

footer:
  links:
    - label: "Patreon"
      icon: "fas fa-fw fa-link"
      url: "https://patreon.com/backpagepod"
    - label: "Discord"
      icon: "fab fa-fw fa-discord"
      url: "https://discord.com/invite/nEdhNnZxXg"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/backpagepod/backpagepod.github.io"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

search_provider: lunr
search_full_content: true
#lunr:
#  search_within_pages: true
